version: '3.8'

services:
  api-kinepro:
    container_name: kinepro_backend
    build:
      context: . # ¡Importante! El contexto es la raíz del monorepo
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    # Cuando agreguen base de datos (ej. Postgres), pueden sumarla acá
    # depends_on:
    #   - db

  web-kinepro:
    container_name: kinepro_frontend
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Ajusten esta variable según cómo la llamen en su Next.js
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - api-kinepro
